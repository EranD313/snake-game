<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #020c08;
    --grid: #041a0e;
    --green: #00ff6a;
    --green-dim: #00a844;
    --green-dark: #003d1a;
    --red: #ff2d55;
    --gold: #ffd700;
    --glow: 0 0 10px #00ff6a, 0 0 30px #00ff6a44;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    color: var(--green);
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.015) 2px,
      rgba(0,255,106,0.015) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.3em;
    text-shadow: var(--glow);
    margin-bottom: 8px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.75; }
  }

  .hud {
    display: flex;
    gap: 48px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
  }

  .hud-item { text-align: center; }
  .hud-label { color: var(--green-dim); font-size: 0.7rem; letter-spacing: 0.2em; }
  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    text-shadow: var(--glow);
  }

  .canvas-wrap {
    position: relative;
    border: 1px solid var(--green-dark);
    box-shadow: 0 0 40px #00ff6a22, inset 0 0 40px #000;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(2, 12, 8, 0.88);
    gap: 16px;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    letter-spacing: 0.2em;
    text-shadow: var(--glow);
  }

  .overlay-title.dead { color: var(--red); text-shadow: 0 0 10px var(--red), 0 0 30px #ff2d5544; }

  .overlay-sub {
    font-size: 0.8rem;
    color: var(--green-dim);
    letter-spacing: 0.15em;
  }

  .btn {
    margin-top: 8px;
    padding: 10px 32px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    cursor: pointer;
    text-shadow: var(--glow);
    box-shadow: 0 0 10px #00ff6a33;
    transition: all 0.2s;
  }

  .btn:hover {
    background: var(--green-dark);
    box-shadow: var(--glow);
  }

  .controls {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.7rem;
    color: var(--green-dim);
    letter-spacing: 0.1em;
  }

  .key {
    display: inline-block;
    border: 1px solid var(--green-dark);
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 0.65rem;
  }

  /* Mobile controls */
  .dpad {
    display: none;
    margin-top: 16px;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
  }

  @media (max-width: 600px) { .dpad { display: grid; } .controls { display: none; } }

  .dpad-btn {
    background: var(--green-dark);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .dpad-btn:active { background: #005522; }
  .dpad-empty { visibility: hidden; }
</style>
</head>
<body>

<div class="title">SNAKE</div>

<div class="hud">
  <div class="hud-item">
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="score">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">BEST</div>
    <div class="hud-value" id="best">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">NIVEAU</div>
    <div class="hud-value" id="level">1</div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="overlay" id="overlay">
    <div class="overlay-title" id="overlay-title">PRÊT ?</div>
    <div class="overlay-sub" id="overlay-sub">Dirige le serpent, mange les pommes</div>
    <button class="btn" id="startBtn" onclick="startGame()">JOUER</button>
  </div>
</div>

<div class="controls">
  <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
  ou
  <span class="key">Z</span><span class="key">S</span><span class="key">Q</span><span class="key">D</span>
  — <span class="key">P</span> Pause
</div>

<div class="dpad">
  <div class="dpad-empty"></div>
  <button class="dpad-btn" onclick="setDir(0,-1)">▲</button>
  <div class="dpad-empty"></div>
  <button class="dpad-btn" onclick="setDir(-1,0)">◄</button>
  <div class="dpad-empty"></div>
  <button class="dpad-btn" onclick="setDir(1,0)">►</button>
  <div class="dpad-empty"></div>
  <button class="dpad-btn" onclick="setDir(0,1)">▼</button>
  <div class="dpad-empty"></div>
</div>

<script>
const COLS = 24, ROWS = 24;
const CELL = Math.min(Math.floor(Math.min(window.innerWidth * 0.9, window.innerHeight * 0.55) / COLS), 22);
const W = COLS * CELL, H = ROWS * CELL;

const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

let snake, dir, nextDir, food, score, best = 0, level, speed, running, paused, loop, particles;

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  snake = [{x:12,y:12},{x:11,y:12},{x:10,y:12}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0; level = 1; speed = 160;
  particles = [];
  placeFood();
  updateHUD();
  running = true; paused = false;
  clearInterval(loop);
  loop = setInterval(tick, speed);
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function tick() {
  if (!running || paused) return;
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wrap around edges
  head.x = (head.x + COLS) % COLS;
  head.y = (head.y + ROWS) % ROWS;
  // Self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    spawnParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2);
    placeFood();
    updateHUD();
    if (score % 50 === 0) levelUp();
  } else {
    snake.pop();
  }
  draw();
}

function levelUp() {
  level++;
  speed = Math.max(60, speed - 15);
  clearInterval(loop);
  loop = setInterval(tick, speed);
  updateHUD();
}

function gameOver() {
  running = false;
  clearInterval(loop);
  if (score > best) best = score;
  document.getElementById('best').textContent = best;
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = 'GAME OVER';
  document.getElementById('overlay-title').className = 'overlay-title dead';
  document.getElementById('overlay-sub').textContent = `Score : ${score}`;
  document.getElementById('startBtn').textContent = 'REJOUER';
  ov.classList.remove('hidden');
  // Flash effect
  flashDead();
}

function flashDead() {
  let f = 0;
  const fl = setInterval(() => {
    draw(f % 2 === 0);
    f++;
    if (f > 6) clearInterval(fl);
  }, 80);
}

function spawnParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 2.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.06 + Math.random() * 0.04
    });
  }
}

function draw(dead = false) {
  // Background
  ctx.fillStyle = '#020c08';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#041a0e';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(W, y*CELL); ctx.stroke();
  }

  // Food
  const fx = food.x * CELL + CELL/2, fy = food.y * CELL + CELL/2, fr = CELL/2 - 2;
  ctx.save();
  ctx.shadowColor = '#ff2d55';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff2d55';
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(fx - fr*0.3, fy - fr*0.3, fr*0.35, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const alpha = dead ? 0.3 : 1;
    const color = dead ? `rgba(255,45,85,${alpha})` : `rgba(0,${Math.floor(200 + 55*(1-t))},${Math.floor(80 + 26*(1-t))},${alpha})`;

    ctx.save();
    ctx.shadowColor = dead ? '#ff2d55' : '#00ff6a';
    ctx.shadowBlur = i === 0 ? 18 : 8;
    ctx.fillStyle = color;

    const padding = i === 0 ? 1 : 2;
    const r = i === 0 ? 4 : 3;
    roundRect(ctx, seg.x*CELL + padding, seg.y*CELL + padding, CELL - padding*2, CELL - padding*2, r);
    ctx.fill();

    // Head eyes
    if (i === 0) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#020c08';
      const ex = dir.x, ey = dir.y;
      const cx2 = seg.x*CELL + CELL/2, cy2 = seg.y*CELL + CELL/2;
      const eyeSize = CELL * 0.14;
      const eyeOffset = CELL * 0.2;
      const fwd = CELL * 0.15;

      // Two eyes perpendicular to direction
      const px = ey, py = -ex;
      ctx.beginPath(); ctx.arc(cx2 + ex*fwd + px*eyeOffset, cy2 + ey*fwd + py*eyeOffset, eyeSize, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx2 + ex*fwd - px*eyeOffset, cy2 + ey*fwd - py*eyeOffset, eyeSize, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life -= p.decay;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5 * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function setDir(x, y) {
  if (!running) return;
  if (x === -dir.x && y === -dir.y) return; // no reverse
  nextDir = {x, y};
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = level;
}

document.addEventListener('keydown', e => {
  const map = {
    'ArrowUp':    [0,-1], 'z': [0,-1], 'Z': [0,-1],
    'ArrowDown':  [0, 1], 's': [0, 1], 'S': [0, 1],
    'ArrowLeft':  [-1,0], 'q': [-1,0], 'Q': [-1,0],
    'ArrowRight': [1, 0], 'd': [1, 0], 'D': [1, 0],
  };
  if (map[e.key]) {
    e.preventDefault();
    setDir(...map[e.key]);
  }
  if (e.key === 'p' || e.key === 'P') {
    if (!running) return;
    paused = !paused;
  }
});

// Initial draw
ctx.fillStyle = '#020c08';
ctx.fillRect(0, 0, W, H);
ctx.strokeStyle = '#041a0e';
for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke(); }
for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke(); }
</script>
</body>
</html>
